name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.4"

      - name: Build release binaries
        run: make release VERSION=${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: bin/

      - name: Rename binaries
        run: |
          for dir in bin/*/; do
            platform=$(basename "$dir")
            mv "$dir/dnf" "bin/dnf-$platform"
          done
          cp dnfd.service bin/dnfd.service
          cp config.yml bin/config.yml

      - name: Generate Checksums
        run: |
          cd bin
          sha256sum dnf-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            bin/dnf-*
            bin/checksums.txt
            bin/dnfd.service
            bin/config.yml
