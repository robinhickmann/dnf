# Default configuration

dns:
  port: 5300
  binds:
    - 127.0.0.1
    - ::1
  zone: 
    name: dns.example.com
    ipv4: 127.0.0.1
    ipv6: ::1
  timeout:
    shutdown: 5s
    read: 10s
    write: 10s

http:
  port: 8080
  binds:
    - 127.0.0.1
    - ::1
  tls:
    enabled: true
    cert_file: cert.pem
    key_file: key.pem
  timeout:
    shutdown: 5s
    idle: 5s
    read: 10s
    write: 10s
