# Default configuration

dns:
  port: 53
  binds:
    - 0.0.0.0
  zone:
    name: dns.example.com
    email: admin.example.com
    ipv4: 127.0.0.1
    ipv6: ::1
    nameservers:
      - ns1.example.com
      - ns2.example.com
  timeout:
    shutdown: 5s
    read: 10s
    write: 10s

http:
  port: 8080
  binds:
    - 0.0.0.0
  tls:
    enabled: true
    cert_file: cert.pem
    key_file: key.pem
  timeout:
    shutdown: 5s
    idle: 5s
    read: 10s
    write: 10s

log:
  level: info
  output: stderr
  time: unix
